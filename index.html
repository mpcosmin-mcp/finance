<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFO Audit OS | V10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .executive-header { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .audit-panel { border-left: 4px solid #3b82f6; background: rgba(30, 41, 59, 0.5); }
        .clickable-chart { cursor: pointer; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-[1700px] mx-auto space-y-8">
        <header class="flex justify-between items-center border-b border-slate-800 pb-6">
            <h1 class="executive-header text-2xl font-black tracking-[0.4em] text-white">CFO <span class="text-blue-500">AUDIT</span></h1>
            <div id="status" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Sistem Activ</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-3 space-y-6">
                <div class="glass p-6 sticky top-8 border-t-4 border-t-blue-600">
                    <h2 class="executive-header text-[10px] font-bold text-slate-500 mb-6 tracking-widest uppercase">Înregistrare Capital</h2>
                    <form id="financeForm" onsubmit="handleForm(event)" class="space-y-4">
                        <input type="date" id="date" required class="w-full bg-slate-800/50 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500">
                        <input type="number" id="amount" step="0.01" placeholder="Suma RON" required class="w-full bg-slate-800/50 p-3 rounded-xl border border-slate-700 font-black text-emerald-400 text-lg">
                        <select id="type" onchange="syncUI()" class="w-full bg-slate-800/50 p-3 rounded-xl border border-slate-700 outline-none">
                            <option value="Cheltuială">Cheltuială (Acum)</option>
                            <option value="Venit Fix (Salariu)">Salariu (Lunar)</option>
                            <option value="Cheltuială Fixă (Lunară)">Fixe (Chirie/Rată)</option>
                            <option value="Investiție">Investiție / Wealth</option>
                            <option value="Cheltuială Viitoare">Viitor (Planificat)</option>
                        </select>
                        <select id="category" class="w-full bg-slate-800/50 p-3 rounded-xl border border-slate-700 outline-none"></select>
                        <button type="submit" id="subBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-white tracking-widest transition-all shadow-lg">EXECUTĂ</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-9 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass p-6 border-b-4 border-blue-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Profitabilitate (Margin)</p>
                        <p class="text-3xl font-black text-blue-400" id="stat-margin">0%</p>
                    </div>
                    <div class="glass p-6 border-b-4 border-emerald-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Aer Liber Luna Curentă</p>
                        <p class="text-3xl font-black text-emerald-400" id="stat-free">0 RON</p>
                    </div>
                    <div class="glass p-6 border-b-4 border-amber-500">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Focus Activ</p>
                        <p class="text-xl font-black text-white" id="stat-focus">Toate Datele</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                    <div class="glass p-8">
                        <h3 class="executive-header text-[10px] font-bold text-slate-500 uppercase mb-8 tracking-widest">Revenue vs OPEX (Click pe lună pentru audit)</h3>
                        <div class="h-80"><canvas id="mainChart" class="clickable-chart"></canvas></div>
                    </div>
                    <div class="glass p-8">
                        <h3 class="executive-header text-[10px] font-bold text-slate-500 uppercase mb-8 tracking-widest">Capital Clusters (Click pe felie)</h3>
                        <div class="h-80 flex justify-center"><canvas id="clusterChart" class="clickable-chart"></canvas></div>
                    </div>
                </div>

                <div id="auditSection" class="glass p-8 audit-panel">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="executive-header text-xs font-bold text-blue-400 uppercase tracking-widest">Audit Detaliat: <span id="auditTitle" class="text-white">Selectează un segment</span></h3>
                        <button onclick="resetAudit()" class="text-[9px] bg-slate-800 px-3 py-1 rounded-full text-slate-400 hover:text-white uppercase font-bold">Resetază Filtre</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="text-slate-500 uppercase text-[9px] border-b border-slate-800">
                                <tr>
                                    <th class="pb-3">Data</th>
                                    <th class="pb-3">Categorie</th>
                                    <th class="pb-3">Suma</th>
                                    <th class="pb-3">Clasa</th>
                                    <th class="pb-3">Justificare</th>
                                </tr>
                            </thead>
                            <tbody id="auditTableBody" class="text-slate-300">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxsPgZ1e0nGuU6YR0GJYm8fstYyo6OhxtjfXOmPyGrwFSTVDePFOMsFB4oGlacpMXNLnQ/exec";
        const MONTH_NAMES = ["Ian", "Feb", "Mar", "Apr", "Mai", "Iun", "Iul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        let allTransactions = [];
        let charts = {};

        Chart.register(ChartDataLabels);

        function syncUI() {
            const CATS = {
                "Cheltuială": ["Mâncare", "Transport", "Ieșiri", "Sănătate", "Haine", "Diverse"],
                "Venit Fix (Salariu)": ["Salariu Bază"],
                "Cheltuială Fixă (Lunară)": ["Chirie", "Credit/Rată", "Utilități", "Abonamente"],
                "Investiție": ["Bursă/ETF", "Crypto", "Fond Freelancing"],
                "Cheltuială Viitoare": ["Mașină", "Nunți", "Vacanțe"]
            };
            const type = document.getElementById('type').value;
            document.getElementById('category').innerHTML = (CATS[type] || CATS["Cheltuială"]).map(c => `<option value="${c}">${c}</option>`).join('');
        }
        syncUI();
        document.getElementById('date').valueAsDate = new Date();

        async function loadData() {
            const res = await fetch(API_URL);
            const d = await res.json();
            allTransactions = d.transactions;
            processAndRender(null, null); // Render inițial fără filtre
        }

        function processAndRender(filterMonth, filterCluster) {
            const now = new Date();
            const curM = now.getMonth();
            const curY = now.getFullYear();

            const clustersConfig = {
                "Supraviețuire": ["Chirie", "Utilități", "Mâncare", "Sănătate", "Transport Zilnic"],
                "Stil de viață": ["Ieșiri", "Hobby", "Haine", "Abonamente", "Ieșiri/Restaurante"],
                "Responsabilități": ["Credit/Rată", "Mașină", "Nunți", "Vacanțe"],
                "Wealth Building": ["Bursă/ETF", "Crypto", "Fond Freelancing"]
            };

            let incArr = Array(12).fill(0);
            let expArr = Array(12).fill(0);
            let clusterStats = { "Supraviețuire": 0, "Stil de viață": 0, "Responsabilități": 0, "Wealth Building": 0 };
            let activeAuditList = [];

            allTransactions.forEach(t => {
                const tDate = new Date(t.date);
                if (tDate.getFullYear() !== curY) return;
                const mIdx = tDate.getMonth();

                // Logica de calcul TRENDS & CLUSTERS
                if (t.type === "Venit Fix (Salariu)" || t.type === "Cheltuială Fixă (Lunară)") {
                    for (let m = mIdx; m < 12; m++) {
                        if (t.type.includes("Venit")) incArr[m] += t.amount;
                        else { 
                            expArr[m] += t.amount;
                            if (m === (filterMonth !== null ? filterMonth : curM)) {
                                for (let cl in clustersConfig) if (clustersConfig[cl].includes(t.category)) clusterStats[cl] += t.amount;
                            }
                        }
                    }
                } else {
                    if (t.type.includes("Venit") || t.type === "Freelance") incArr[mIdx] += t.amount;
                    else {
                        expArr[mIdx] += t.amount;
                        if (mIdx === (filterMonth !== null ? filterMonth : curM)) {
                            for (let cl in clustersConfig) if (clustersConfig[cl].includes(t.category)) clusterStats[cl] += t.amount;
                        }
                    }
                }

                // Logica de filtrare pentru AUDIT TABLE
                let matchMonth = (filterMonth === null || mIdx === filterMonth);
                let matchCluster = (filterCluster === null);
                if (filterCluster) {
                    for (let cl in clustersConfig) if (cl === filterCluster && clustersConfig[cl].includes(t.category)) matchCluster = true;
                }

                if (matchMonth && matchCluster && !t.type.includes("Venit")) activeAuditList.push(t);
            });

            // Update KPIs
            const targetM = filterMonth !== null ? filterMonth : curM;
            const margin = incArr[targetM] > 0 ? ((incArr[targetM] - expArr[targetM]) / incArr[targetM] * 100).toFixed(1) : 0;
            document.getElementById('stat-margin').innerText = margin + "%";
            document.getElementById('stat-free').innerText = Math.round(incArr[targetM] - expArr[targetM]) + " RON";
            document.getElementById('stat-focus').innerText = filterMonth !== null ? MONTH_NAMES[filterMonth] : "Luna Curentă";

            renderCharts(incArr, expArr, clusterStats);
            renderAuditTable(activeAuditList, filterMonth, filterCluster);
        }

        function renderCharts(inc, exp, clusters) {
            // Trend Chart
            if(charts.main) charts.main.destroy();
            charts.main = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: { labels: MONTH_NAMES, datasets: [
                    { label: 'Revenue', data: inc, borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.3 },
                    { label: 'OPEX', data: exp, borderColor: '#f43f5e', backgroundColor: '#f43f5e', tension: 0.3 }
                ]},
                options: {
                    responsive: true, maintainAspectRatio: false,
                    onClick: (e, elements) => {
                        if (elements.length > 0) processAndRender(elements[0].index, null);
                    },
                    plugins: { legend: { display: false }, datalabels: { display: false } }
                }
            });

            // Cluster Chart
            if(charts.cluster) charts.cluster.destroy();
            charts.cluster = new Chart(document.getElementById('clusterChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(clusters), datasets: [{ data: Object.values(clusters), backgroundColor: ['#3b82f6', '#fbbf24', '#f43f5e', '#10b981'], borderWidth: 0 }]},
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '80%',
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const label = charts.cluster.data.labels[elements[0].index];
                            processAndRender(null, label);
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        datalabels: { color: '#fff', font: { weight: 'bold' }, formatter: (v, ctx) => v > 0 ? ctx.chart.data.labels[ctx.dataIndex] : '' }
                    }
                }
            });
        }

        function renderAuditTable(list, m, c) {
            const body = document.getElementById('auditTableBody');
            document.getElementById('auditTitle').innerText = (m !== null ? MONTH_NAMES[m] : "") + " " + (c || "Toate cheltuielile");
            body.innerHTML = list.map(t => `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-all">
                    <td class="py-4 opacity-50">${new Date(t.date).toLocaleDateString('ro-RO')}</td>
                    <td class="py-4 font-bold text-white">${t.category}</td>
                    <td class="py-4 text-rose-400 font-black">${t.amount} RON</td>
                    <td class="py-4"><span class="px-2 py-1 rounded bg-slate-800 text-[10px] uppercase">${t.class}</span></td>
                    <td class="py-4 italic opacity-70">${t.reason || t.desc || '-'}</td>
                </tr>
            `).join('');
            if(list.length === 0) body.innerHTML = '<tr><td colspan="5" class="py-10 text-center opacity-30 italic font-bold">Nicio tranzacție găsită pentru acest filtru</td></tr>';
        }

        function resetAudit() { processAndRender(null, null); }

        async function handleForm(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn'); btn.disabled = true; btn.innerText = "EXECUTING...";
            const payload = {
                date: document.getElementById('date').value, type: document.getElementById('type').value,
                category: document.getElementById('category').value, amount: document.getElementById('amount').value,
                classType: 'Nevoie', importance: 5, reason: 'Manual'
            };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload();
        }

        loadData();
    </script>
</body>
</html>
