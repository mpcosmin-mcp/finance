<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal CEO | Strategic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; padding: 1.5rem; }
        .stat-value { font-size: 1.875rem; font-weight: 800; }
        .view-hidden { display: none; }
        .cal-day { min-height: 60px; background: #1e293b; border-radius: 0.5rem; padding: 0.25rem; font-size: 0.7rem; }
        .cal-today { outline: 2px solid #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto space-y-8">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white">THE EXECUTIVE <span class="text-sky-500">TRUTH</span></h1>
                <p class="text-slate-500 text-sm">Vision. Discipline. Net Worth.</p>
            </div>
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                <button onclick="showPage('input')" id="btn-input" class="px-6 py-2 rounded-lg font-bold transition-all bg-sky-600 text-white">INPUT</button>
                <button onclick="showPage('strategy')" id="btn-strategy" class="px-6 py-2 rounded-lg font-bold transition-all text-slate-400">STRATEGY</button>
            </div>
        </div>

        <div id="page-input" class="max-w-3xl mx-auto space-y-6">
            <div class="card shadow-2xl shadow-sky-900/10">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="w-2 h-6 bg-sky-500 rounded"></span> Alocare Capital</h2>
                <form id="financeForm" onsubmit="handleForm(event)" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="date" id="date" required class="bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-sky-500">
                        <input type="number" id="amount" step="0.01" placeholder="Suma (RON)" required class="bg-slate-800 p-3 rounded-lg border border-slate-700 font-bold text-sky-400">
                        <select id="type" onchange="syncUI()" class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                            <option value="Cheltuială">OPEX (Cheltuială Unică)</option>
                            <option value="Cheltuială Fixă (Lunară)">FIXED (Chirie/Rată)</option>
                            <option value="Venit">REVENUE (Venit)</option>
                            <option value="Investiție">CAPEX (Investiție)</option>
                        </select>
                        <select id="category" class="bg-slate-800 p-3 rounded-lg border border-slate-700"></select>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <select id="classType" class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                            <option value="Nevoie">NEED (Survival)</option>
                            <option value="Dorință">WANT (Lifestyle)</option>
                            <option value="Creștere">GROWTH (Wealth)</option>
                        </select>
                        <div class="flex items-center gap-3 bg-slate-800 p-3 rounded-lg border border-slate-700">
                            <span class="text-xs text-slate-500">ROI:</span>
                            <input type="range" id="importance" min="1" max="5" value="3" class="flex-grow">
                            <span id="impLabel" class="font-bold">3</span>
                        </div>
                    </div>
                    <textarea id="reason" placeholder="Justificare strategică (De ce?)..." class="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 h-20"></textarea>
                    <button type="submit" id="subBtn" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-xl font-black text-white tracking-widest transition-all">EXECUTE TRANSACTION</button>
                </form>
            </div>
        </div>

        <div id="page-strategy" class="view-hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="card"><p class="text-xs text-slate-500 uppercase font-bold">Health Score</p><div class="flex items-baseline gap-2"><span class="stat-value text-sky-400" id="hScore">0</span><span class="text-xs">/100</span></div></div>
                <div class="card"><p class="text-xs text-slate-500 uppercase font-bold">Op. Margin</p><div class="flex items-baseline gap-2"><span class="stat-value text-emerald-400" id="hMargin">0</span><span class="text-xs">%</span></div></div>
                <div class="card"><p class="text-xs text-slate-500 uppercase font-bold">Waste Tax</p><p class="stat-value text-rose-500" id="hWaste">0</p></div>
                <div class="card"><p class="text-xs text-slate-500 uppercase font-bold">Revenue Target</p><p class="stat-value text-white" id="hTarget">0</p></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="card lg:col-span-2">
                    <h3 class="font-bold mb-4 text-slate-400 uppercase text-xs">P&L Trends (Monthly Revenue vs Expense)</h3>
                    <div class="h-64"><canvas id="mainChart"></canvas></div>
                </div>
                <div class="card">
                    <h3 class="font-bold mb-4 text-slate-400 uppercase text-xs">Capital Allocation (Clusters)</h3>
                    <div class="h-64"><canvas id="clusterChart"></canvas></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="card">
                    <h3 class="font-bold mb-4 text-slate-400 uppercase text-xs">Operational Calendar</h3>
                    <div id="calGrid" class="grid grid-cols-7 gap-2"></div>
                </div>
                <div class="card">
                    <h3 class="font-bold mb-4 text-slate-400 uppercase text-xs">Weekly Burn Velocity</h3>
                    <div class="h-64"><canvas id="weeklyChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxsPgZ1e0nGuU6YR0GJYm8fstYyo6OhxtjfXOmPyGrwFSTVDePFOMsFB4oGlacpMXNLnQ/exec";
        const CATS = {
            "Cheltuială": ["Mâncare", "Transport", "Ieșiri", "Haine", "Diverse"],
            "Cheltuială Fixă (Lunară)": ["Chirie", "Credit/Rată", "Utilități", "Abonamente"],
            "Venit": ["Salariu", "Freelance", "Bonus"],
            "Investiție": ["Bursă/ETF", "Crypto", "Business"]
        };

        function showPage(p) {
            document.getElementById('page-input').classList.toggle('view-hidden', p !== 'input');
            document.getElementById('page-strategy').classList.toggle('view-hidden', p !== 'strategy');
            document.getElementById('btn-input').className = p === 'input' ? "px-6 py-2 rounded-lg font-bold bg-sky-600 text-white" : "px-6 py-2 rounded-lg font-bold text-slate-400";
            document.getElementById('btn-strategy').className = p === 'strategy' ? "px-6 py-2 rounded-lg font-bold bg-sky-600 text-white" : "px-6 py-2 rounded-lg font-bold text-slate-400";
            if(p === 'strategy') loadData();
        }

        function syncUI() {
            const type = document.getElementById('type').value;
            const catSel = document.getElementById('category');
            catSel.innerHTML = (CATS[type] || CATS["Cheltuială"]).map(c => `<option value="${c}">${c}</option>`).join('');
        }
        syncUI();
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('importance').oninput = e => document.getElementById('impLabel').innerText = e.target.value;

        async function loadData() {
            const res = await fetch(API_URL);
            const d = await response.json();
            
            document.getElementById('hScore').innerText = d.summary.health;
            document.getElementById('hMargin').innerText = d.summary.margin;
            document.getElementById('hWaste').innerText = d.audit.waste + " RON";
            document.getElementById('hTarget').innerText = d.summary.target - d.summary.income + " RON";

            renderCharts(d);
            renderCalendar(d.calendar);
        }

        function renderCharts(d) {
            new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: { labels: d.charts.labels, datasets: [
                    { label: 'Revenue', data: d.charts.monthly, borderColor: '#10b981', tension: 0.3, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' },
                    { label: 'OPEX', data: d.charts.monthlyExp, borderColor: '#f43f5e', tension: 0.3 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });

            new Chart(document.getElementById('clusterChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(d.charts.clusters), datasets: [{ data: Object.values(d.charts.clusters), backgroundColor: ['#38bdf8', '#fbbf24', '#f43f5e', '#10b981'], borderWidth: 0 }]},
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }
            });
        }

        function renderCalendar(cal) {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = "";
            const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                const dayData = cal[i] || { expense: 0 };
                grid.innerHTML += `<div class="cal-day ${i === new Date().getDate() ? 'cal-today' : ''}"><p class="font-bold opacity-50">${i}</p>${dayData.expense > 0 ? `<p class="text-rose-400">-${dayData.expense.toFixed(0)}</p>` : ''}</div>`;
            }
        }

        async function handleForm(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.disabled = true; btn.innerText = "AUDITING...";
            
            const payload = {
                date: document.getElementById('date').value, type: document.getElementById('type').value,
                category: document.getElementById('category').value, amount: document.getElementById('amount').value,
                classType: document.getElementById('classType').value, importance: document.getElementById('importance').value,
                reason: document.getElementById('reason').value
            };

            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Transaction Executed.");
            location.reload();
        }
    </script>
</body>
</html>
