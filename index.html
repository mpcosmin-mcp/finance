<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFO Executive OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #030712; color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .executive-header { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .kpi-card { transition: transform 0.3s ease; border-top: 4px solid transparent; }
        .kpi-card:hover { transform: translateY(-5px); }
        .view-hidden { display: none; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-7xl mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <h1 class="executive-header text-2xl font-black tracking-widest text-white uppercase">CFO <span class="text-blue-500">PRO</span></h1>
            <div class="flex bg-slate-900/50 p-1 rounded-2xl border border-slate-800">
                <button onclick="showPage('input')" id="btn-input" class="px-8 py-2 rounded-xl font-black text-xs transition-all bg-blue-600 text-white shadow-lg">INPUT</button>
                <button onclick="showPage('strategy')" id="btn-strategy" class="px-8 py-2 rounded-xl font-black text-xs transition-all text-slate-400">STRATEGY</button>
            </div>
        </div>

        <div id="page-input" class="max-w-2xl mx-auto">
            <div class="glass p-8 shadow-2xl border-t-blue-500/50 border-t-4">
                <h2 class="executive-header text-lg font-bold mb-8 text-center tracking-widest text-blue-400">Logare Capital</h2>
                <form id="financeForm" onsubmit="handleForm(event)" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="date" id="date" required class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 outline-none focus:border-blue-500">
                        <input type="number" id="amount" step="0.01" placeholder="SUMA (RON)" required class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 font-black text-emerald-400 text-xl">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <select id="type" onchange="syncUI()" class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                            <option value="Cheltuială">Cheltuială Operativă</option>
                            <option value="Venit Fix (Salariu)">Venit Fix (Salariu)</option>
                            <option value="Cheltuială Fixă (Lunară)">Cheltuială Fixă (Chirie/Rată)</option>
                            <option value="Investiție">Investiție / Wealth</option>
                            <option value="Cheltuială Viitoare">Viitor (Nuntă/Mașină)</option>
                        </select>
                        <select id="category" class="bg-slate-800/50 p-4 rounded-xl border border-slate-700"></select>
                    </div>
                    <button type="submit" id="subBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-white tracking-[0.2em] shadow-xl shadow-blue-900/40">EXECUTĂ TRANZACȚIE</button>
                </form>
            </div>
        </div>

        <div id="page-strategy" class="view-hidden space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-8 kpi-card border-t-blue-500 text-center">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Venit Total Martie</p>
                    <p class="text-3xl font-black text-white" id="stat-income">0 RON</p>
                </div>
                <div class="glass p-8 kpi-card border-t-rose-500 text-center">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Obligații (Fixe + Planificat)</p>
                    <p class="text-3xl font-black text-rose-500" id="stat-locked">0 RON</p>
                </div>
                <div class="glass p-8 kpi-card border-t-emerald-500 text-center ring-4 ring-emerald-500/20">
                    <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-2">Aer Liber (Safe to Spend)</p>
                    <p class="text-4xl font-black text-emerald-400" id="stat-free">0 RON</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-8">
                    <h3 class="executive-header text-xs font-bold text-slate-500 uppercase mb-8 tracking-widest">Revenue vs OPEX (Trends)</h3>
                    <div class="h-80"><canvas id="mainChart"></canvas></div>
                </div>
                <div class="glass p-8">
                    <h3 class="executive-header text-xs font-bold text-slate-500 uppercase mb-8 tracking-widest">Capital Clusters (Real-Time)</h3>
                    <div class="h-80 flex justify-center"><canvas id="clusterChart"></canvas></div>
                </div>
            </div>

            <div class="glass p-8">
                <h3 class="executive-header text-xs font-bold text-slate-500 uppercase mb-6 tracking-widest">Planificare Viitor (Sinking Funds)</h3>
                <div id="sinkingList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-sm font-bold"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxsPgZ1e0nGuU6YR0GJYm8fstYyo6OhxtjfXOmPyGrwFSTVDePFOMsFB4oGlacpMXNLnQ/exec";
        const CATS = {
            "Cheltuială": ["Mâncare", "Transport", "Ieșiri", "Sănătate", "Haine", "Diverse"],
            "Venit Fix (Salariu)": ["Salariu Bază"],
            "Cheltuială Fixă (Lunară)": ["Chirie", "Credit/Rată", "Utilități", "Abonamente"],
            "Investiție": ["Bursă/ETF", "Crypto", "Business"],
            "Cheltuială Viitoare": ["Mașină (RCA/Revizii)", "Nunți/Evenimente", "Vacanțe"]
        };

        Chart.register(ChartDataLabels); // Activăm plugin-ul de etichete

        function showPage(p) {
            document.getElementById('page-input').classList.toggle('view-hidden', p !== 'input');
            document.getElementById('page-strategy').classList.toggle('view-hidden', p !== 'strategy');
            document.getElementById('btn-input').className = p === 'input' ? "px-8 py-2 rounded-xl font-black text-xs transition-all bg-blue-600 text-white shadow-lg" : "px-8 py-2 rounded-xl font-black text-xs transition-all text-slate-400";
            document.getElementById('btn-strategy').className = p === 'strategy' ? "px-8 py-2 rounded-xl font-black text-xs transition-all bg-blue-600 text-white shadow-lg" : "px-8 py-2 rounded-xl font-black text-xs transition-all text-slate-400";
            if(p === 'strategy') loadData();
        }

        function syncUI() {
            const type = document.getElementById('type').value;
            const catSel = document.getElementById('category');
            catSel.innerHTML = (CATS[type] || CATS["Cheltuială"]).map(c => `<option value="${c}">${c}</option>`).join('');
        }
        syncUI();

        let charts = {};

        async function loadData() {
            const res = await fetch(API_URL);
            const d = await res.json();
            
            // Update KPIs
            document.getElementById('stat-income').innerText = d.summary.income.toFixed(0) + " RON";
            document.getElementById('stat-locked').innerText = (d.summary.fixed + d.summary.sinking).toFixed(0) + " RON";
            document.getElementById('stat-free').innerText = d.summary.free.toFixed(0) + " RON";

            renderCharts(d);
            renderSinking(d.sinking);
        }

        function renderCharts(d) {
            // Chart Principal: Revenue vs OPEX
            if(charts.main) charts.main.destroy();
            charts.main = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun', 'Iul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [
                        { label: 'REVENUE', data: d.charts.incArr, borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.3, pointRadius: 5 },
                        { label: 'OPEX', data: d.charts.expArr, borderColor: '#f43f5e', backgroundColor: '#f43f5e', tension: 0.3, pointRadius: 5 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: { color: '#fff', align: 'top', font: { weight: 'bold', size: 10 }, formatter: (v) => v > 0 ? v : '' }
                    },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#64748b' } } }
                }
            });

            // Chart Clusters
            if(charts.cluster) charts.cluster.destroy();
            charts.cluster = new Chart(document.getElementById('clusterChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(d.charts.clusters),
                    datasets: [{
                        data: Object.values(d.charts.clusters),
                        backgroundColor: ['#3b82f6', '#fbbf24', '#f43f5e', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '70%',
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            color: '#fff', font: { weight: 'bold', size: 11 },
                            formatter: (value, ctx) => {
                                let label = ctx.chart.data.labels[ctx.dataIndex];
                                return value > 0 ? label + ": " + value : '';
                            },
                            anchor: 'end', align: 'end', offset: 10
                        }
                    }
                }
            });
        }

        function renderSinking(sinking) {
            const list = document.getElementById('sinkingList');
            list.innerHTML = sinking.map(s => `
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700">
                    <div class="text-blue-400 uppercase text-[10px] tracking-widest">${s.name}</div>
                    <div class="flex justify-between items-baseline mt-1">
                        <div class="text-xl text-white">${s.monthly} <span class="text-xs text-slate-500">RON/lună</span></div>
                        <div class="text-xs text-slate-500">din ${s.total}</div>
                    </div>
                </div>
            `).join('');
        }

        async function handleForm(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn'); btn.disabled = true; btn.innerText = "EXECUTING...";
            const payload = {
                date: document.getElementById('date').value, type: document.getElementById('type').value,
                category: document.getElementById('category').value, amount: document.getElementById('amount').value
            };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Tranzacție Confirmată."); location.reload();
        }
    </script>
</body>
</html>
